version: '3.8'

services:
  nginx:
    image: nginx:1.17
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - supero_net

  redis:
    image: redis
    volumes:
      - redis-data:/data
    networks:
      - supero_net

  postgres:
    image: postgres:12
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data:cached
    networks:
      - supero_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery --app app.tasks worker --loglevel=DEBUG -Q main-queue -c 1
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres
    depends_on:
      - postgres
      - redis
    networks:
      - supero_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python app/main.py
    tty: true
    expose:
      - "8888"
    environment:
      PYTHONPATH: .
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres
    depends_on:
      - postgres
      - redis
    networks:
      - supero_net

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: cksdnr1@gmail.com
      PGADMIN_DEFAULT_PASSWORD: cksdnr0809!
    depends_on:
      - postgres
    networks:
      - supero_net

  elasticsearch:
    image: arm64v8/elasticsearch:8.14.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - ELASTIC_PASSWORD=elastic
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - supero_net

  logstash:
    image: arm64v8/logstash:8.14.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=elastic
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      - elasticsearch
    networks:
      - supero_net

  kibana:
    image: arm64v8/kibana:8.14.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana
      - ELASTICSEARCH_PASSWORD=kibana
    depends_on:
      - elasticsearch
    networks:
      - supero_net

volumes:
  db-data:
  redis-data:
  esdata:
  nginx-logs:

networks:
  supero_net:
    driver: bridge
