version: '3.8'

services:
  nginx:
    ports:
      - "8000:80"
      - "443:443"
    restart: always

  redis:
    ports:
      - "6379:6379"
    restart: always

  postgres:
    ports:
      - "5432:5432"
    restart: always

  worker:
    restart: always

  backend:
    restart: always

  pgadmin:
    ports:
      - "8088:80"
    restart: always

  elasticsearch:
    ports:
      - "9200:9200"
    restart: always

  logstash:
    restart: always

  kibana:
    ports:
      - "5601:5601"
    restart: always
